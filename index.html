function task1() {

function task2() {
  if(disp1flg== true){

  }

     disp2flg = true;
  }// タスク2を予約
 
  let task1Interval = int(t1slider.value()*1000);
  setTimeout(task1, task1Interval);

  // 重複しないランダムな整数を取得
  rd = getRandomUniqueInteger();
  cnt--;
  if(cnt === 250){
    break;
  }
}

// スライダーの意味説明
function expslder() {
  textSize(20);
  fill (0,0,255);
  text("変換速度",340,80);
  text("文字サイズ",1800,80);
}

function rstime(val1,val2){  
// text(cnt,width/2,50);　　　　　　　　　　　　　見かけ上の処理時間
  text("残り時間:"+int((val1+val2)*cnt/60)+"分",width-500,50);
  text("残り文字数"+cnt,width/2,50);                       // 残り文字数
}

function getRandomUniqueInteger() {
  if (numbers.length > 0) {
    let index = floor(random(numbers.length));
    let randomValue = numbers[index];
    numbers.splice(index, 1); // 要素を削除
    return randomValue;
  } else {
    // 配列が空の場合、新しいセットを生成または処理を停止できます
    // この例では、0から255までの整数のセットをリセットします
    numbers = [];
    for (let i = 0; i <= data.length; i++) {
      numbers.push(i);
    }
    return getRandomUniqueInteger(); // 再帰的に呼び出して新しい値を取得
  }
}
